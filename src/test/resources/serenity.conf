serenity {
  take.screenshots = "BEFORE_AND_AFTER_EACH_STEP"
  project.name = "CyberGuard UI - POM Factory"
}

webdriver {
  driver = chrome
  base.url = "http://localhost:4200"
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--headless=new", "--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu", "--window-size=1920,1080"]
    }
  }
}
